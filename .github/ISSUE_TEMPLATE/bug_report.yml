name: Bug report
description: Something is broken or behaving unexpectedly.
title: "[bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project does this affect?
      options:
        - cloud
        - companion
        - sdk
        - agent-core
        - capture-core
        - swc-plugin
        - claude-plugin
        - docs
        - examples
        - ci
        - infra
        - not sure
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you observe? Include exact error messages, screenshots, or short videos if useful.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: How to reproduce
      description: Numbered steps. The shorter and more deterministic, the better.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser + version, OS, package version, anything that might matter.
    validations:
      required: false
  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Hypotheses about the cause, related issues, anything else.
    validations:
      required: false
